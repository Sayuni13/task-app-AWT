<!DOCTYPE html>
<html>
<head>
    <title>TaskApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

    <h1> TaskApp </h1>

    <div class="tabs" id="topTabs">
        <button onclick="showPage('login')">Sign In</button>
        <button onclick="showPage('register')">Register</button>
    </div>

    <div id="login" class="page">

        <h2>Sign In</h2>

        <label>USERNAME</label>
        <input type="text" id="loginUsername" placeholder="your_username">

        <label>PASSWORD</label>
        <input type="password" id="loginPassword" placeholder="password">

        <button class="mainBtn" onclick="loginUser()">Sign In</button>

    </div>

    <div id="register" class="page hidden">

        <h2>Create Account</h2>

        <label>USERNAME</label>
        <input type="text" id="regUsername" placeholder="choose_username">

        <label>PASSWORD</label>
        <input type="password" id="regPassword" placeholder="create_password">

        <button class="mainBtn" onclick="registerUser()">Register</button>

    </div>

    <div id="tasks" class="page hidden">

        <h2>My Tasks</h2>

        <label>NEW TASK</label>
        <input type="text" id="taskInput" placeholder="Add your task here">

        <button class="mainBtn" onclick="addTask()">Add Task</button>

        <div class="taskButtons">
            <button class="smallBtn" onclick="getTasks()">Show Tasks</button>
            <button class="smallBtn clearBtn" onclick="clearTasks()">Clear Tasks</button>
        </div>

        <ul id="taskList"></ul>

        <button class="logout" onclick="logoutUser()">Logout</button>

    </div>

    <p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
